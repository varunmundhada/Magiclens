<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AR Pipeline Viewer - Underground Visualization</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.129/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.129/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #cesiumContainer {
            height: 100%;
            width: 100%;
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #cesiumContainer {
            position: relative;
        }

        /* Responsive Control Panel */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #333;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .control-btn.active {
            background: #4CAF50;
            color: white;
        }

        .control-btn.disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
        }

        /* Settings Panel */
        .settings-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            min-width: 280px;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .settings-panel.open {
            transform: translateX(0);
        }

        .settings-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #333;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 1001;
        }

        .settings-toggle:hover {
            transform: scale(1.1);
        }

        .settings-toggle.open {
            background: #2196F3;
            color: white;
        }

        .settings-group {
            margin-bottom: 20px;
        }

        .settings-group h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
            font-weight: 600;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px 0;
        }

        .setting-item label {
            font-size: 14px;
            color: #555;
        }

        .setting-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #2196F3;
        }

        .setting-item input[type="range"] {
            width: 120px;
            margin-left: 10px;
        }

        .setting-item input[type="text"] {
            width: 50px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 2px;
        }

        /* Status Bar */
        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        /* Pipeline Info Panel */
        .pipeline-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            min-width: 300px;
            max-width: 400px;
        }

        .pipeline-info.show {
            display: block;
        }

        .pipeline-info h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }

        .pipeline-info .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .pipeline-info .info-label {
            font-weight: 600;
            color: #555;
        }

        .pipeline-info .info-value {
            color: #333;
        }

        .pipeline-info .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }

        .pipeline-info .close-btn:hover {
            color: #333;
        }

        /* Underground Mode Indicator */
        .underground-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(139, 69, 19, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(10px);
        }

        .underground-indicator.show {
            display: block;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .control-panel {
                top: 10px;
                left: 10px;
                gap: 10px;
            }

            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 18px;
            }

            .settings-panel {
                top: 10px;
                right: 10px;
                left: 10px;
                min-width: auto;
                max-height: 80vh;
                overflow-y: auto;
            }

            .settings-toggle {
                top: 10px;
                right: 10px;
                width: 50px;
                height: 50px;
                font-size: 18px;
            }

            .status-bar {
                bottom: 10px;
                left: 10px;
                right: 10px;
                font-size: 12px;
                padding: 10px;
            }

            .pipeline-info {
                left: 10px;
                right: 10px;
                transform: translateY(-50%);
                min-width: auto;
            }
        }

        /* Tablet Responsive */
        @media (min-width: 769px) and (max-width: 1024px) {
            .control-panel {
                top: 15px;
                left: 15px;
            }

            .settings-panel {
                top: 15px;
                right: 15px;
            }
        }

        /* Hide Cesium default controls */
        #cesiumContainer .cesium-viewer-toolbar,
        #cesiumContainer .cesium-viewer-baseLayerPickerContainer,
        #cesiumContainer .cesium-viewer-homeButtonContainer,
        #cesiumContainer .cesium-viewer-navigationHelpButtonContainer,
        #cesiumContainer .cesium-viewer-animationContainer,
        #cesiumContainer .cesium-viewer-timelineContainer {
            display: none !important;
        }

        /* Custom underground terrain styling */
        .underground-mode .cesium-globe {
            filter: brightness(0.7) sepia(0.3) hue-rotate(30deg);
        }

        /* Pipeline depth indicators */
        .depth-indicator {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1500;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    
    <!-- Control Panel -->
    <div class="control-panel">
        <button id="gpsBtn" class="control-btn" title="Enable GPS Tracking">
            <i class="fas fa-location-arrow"></i>
        </button>
        <button id="arBtn" class="control-btn" title="Enable AR Mode">
            <i class="fas fa-cube"></i>
        </button>
        <button id="calibrateBtn" class="control-btn" title="Calibrate Compass" style="display: none;">
            <i class="fas fa-compass"></i>
        </button>
        <button id="undergroundBtn" class="control-btn" title="Toggle Underground View">
            <i class="fas fa-eye"></i>
        </button>
    </div>

    <!-- Settings Toggle -->
    <button id="settingsToggle" class="settings-toggle" title="Settings">
        <i class="fas fa-cog"></i>
    </button>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-group">
            <h3>Visualization</h3>
            <div class="setting-item">
                <label>Translucency</label>
                <input type="checkbox" id="translucencyEnabled" checked>
            </div>
            <div class="setting-item">
                <label>Fade by Distance</label>
                <input type="checkbox" id="fadeByDistance" checked>
            </div>
            <div class="setting-item">
                <label>Show Pipelines</label>
                <input type="checkbox" id="showPipelines" checked>
            </div>
            <div class="setting-item">
                <label>Terrain Alpha</label>
                <input type="range" id="terrainAlpha" min="0" max="1" step="0.01" value="0.5">
                <input type="text" id="terrainAlphaText" value="0.5" readonly>
            </div>
        </div>
        
        <div class="settings-group">
            <h3>Camera Controls</h3>
            <div class="setting-item">
                <label>Enable Zoom</label>
                <input type="checkbox" id="enableZoom" checked>
            </div>
            <div class="setting-item">
                <label>Enable Pan</label>
                <input type="checkbox" id="enablePan" checked>
            </div>
            <div class="setting-item">
                <label>Enable Rotate</label>
                <input type="checkbox" id="enableRotate" checked>
            </div>
        </div>
    </div>

    <!-- Underground Mode Indicator -->
    <div id="undergroundIndicator" class="underground-indicator">
        <i class="fas fa-mountain"></i> Underground Mode Active
    </div>

    <!-- Pipeline Info Panel -->
    <div id="pipelineInfo" class="pipeline-info">
        <button class="close-btn" onclick="closePipelineInfo()">
            <i class="fas fa-times"></i>
        </button>
        <h2 id="pipelineTitle">Pipeline Information</h2>
        <div id="pipelineDetails"></div>
    </div>

    <!-- Status Bar -->
    <div id="statusBar" class="status-bar">
        Initializing AR Pipeline Viewer... Please ensure HTTPS connection.
    </div>

    <script>
        // Cesium Ion Access Token
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5Y2ZiMzU0Mi00NjkyLTQxZjctOGNjZC02YjgyYzliOTEwNGYiLCJpZCI6Mjk2ODk1LCJpYXQiOjE3NDc2NTc5MzZ9.Mb95-v_3Pm4NQQohnck02L-zmHD4SWj5vv57m0fP4ig';

        // Global variables
        let viewer, scene, globe;
        let gpsEnabled = false, arEnabled = false, undergroundMode = false;
        let gpsWatchId = null, orientationListenerAttached = false;
        let userLocationEntity = null, accuracyCircleEntity = null;
        let pipelineEntities = [];
        let currentPitch = -30, currentHeading = 0, currentRoll = 0;
        let lastSensorUpdateTime = 0;
        let lastUserPitchInteractionTime = 0;
        const USER_PITCH_OVERRIDE_DURATION = 2000;
        const SENSOR_UPDATE_INTERVAL = 100;
        const AR_SENSOR_UPDATE_INTERVAL = 50;
        const eyeHeightConst = 1.6;

        // Device detection
        const isWebView = /(WebView|Android|iPhone|iPad|iPod)/i.test(navigator.userAgent);
        const isIOS = /(iPhone|iPad|iPod)/i.test(navigator.userAgent);
        const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // Initialize Cesium Viewer
        function initializeViewer() {
            viewer = new Cesium.Viewer("cesiumContainer", {
                terrainProvider: Cesium.Terrain.fromWorldTerrain(),
                imageryProvider: new Cesium.BingMapsImageryProvider({
                    url: 'https://dev.virtualearth.net',
                    key: 'AqTGBsziZHIJYYxgivLBf0hVdrAk9mWO5cQcb8Yux8sW5M8c8opEC2lZqKR1ZZXf',
                    mapStyle: Cesium.BingMapsStyle.AERIAL_WITH_LABELS_ON_DEMAND
                }),
                baseLayerPicker: false,
                shouldAnimate: true,
                sceneMode: Cesium.SceneMode.SCENE3D,
                vrButton: false,
                geocoder: false,
                homeButton: false,
                scene3DOnly: true,
                selectionIndicator: false,
                infoBox: false,
                animation: false,
                timeline: false,
                requestRenderMode: true,
                maximumRenderTimeChange: Infinity,
                contextOptions: {
                    webgl: {
                        alpha: false,
                        antialias: true,
                        depth: true,
                        stencil: false,
                        powerPreference: "high-performance"
                    }
                },
                msaaSamples: 4
            });

            scene = viewer.scene;
            globe = scene.globe;

            // Configure scene
            scene.camera.frustum.near = 0.01;
            scene.camera.frustum.fov = Cesium.Math.toRadians(70);
            scene.skyAtmosphere.show = true;
            scene.fog.enabled = true;
            scene.fog.density = 0.00005;
            scene.fog.minimumBrightness = 0.03;
            globe.enableLighting = true;
            viewer.shadows = true;
            scene.highDynamicRange = false;

            // Configure bloom effect
            if (scene.postProcessStages.bloom) {
                scene.postProcessStages.bloom.enabled = true;
                scene.postProcessStages.bloom.uniforms.contrast = 110;
                scene.postProcessStages.bloom.uniforms.brightness = -0.05;
            }

            // Disable collision detection for underground viewing
            scene.screenSpaceCameraController.enableCollisionDetection = false;
            scene.screenSpaceCameraController.enableTilt = true;

            // Configure globe for underground viewing
            globe.undergroundColor = Cesium.Color.SADDLEBROWN;
            globe.depthTestAgainstTerrain = true;

            // Add 3D Tiles for enhanced terrain
            viewer.scene.primitives.add(new Cesium.Cesium3DTileset({
                url: Cesium.IonResource.fromAssetId(96188),
                maximumScreenSpaceError: isWebView ? 8 : 4
            }));

            updateStatus("Viewer initialized successfully");
        }

        // Status update function
        function updateStatus(message, isError = false) {
            const statusBar = document.getElementById('statusBar');
            statusBar.textContent = message;
            statusBar.style.color = isError ? '#ff6b6b' : 'white';
            if (isError) console.error(message);
            else console.log(message);
        }

        // Initialize controls
        function initializeControls() {
            const gpsBtn = document.getElementById('gpsBtn');
            const arBtn = document.getElementById('arBtn');
            const calibrateBtn = document.getElementById('calibrateBtn');
            const undergroundBtn = document.getElementById('undergroundBtn');
            const settingsToggle = document.getElementById('settingsToggle');
            const settingsPanel = document.getElementById('settingsPanel');

            // GPS Button
            gpsBtn.addEventListener('click', () => {
                if (!gpsEnabled) {
                    startGPS();
                } else {
                    stopGPS();
                }
            });

            // AR Button
            arBtn.addEventListener('click', () => {
                if (!arEnabled) {
                    startAR();
                } else {
                    stopAR();
                }
            });

            // Calibrate Button
            calibrateBtn.addEventListener('click', calibrateCompass);

            // Underground Button
            undergroundBtn.addEventListener('click', toggleUndergroundMode);

            // Settings Toggle
            settingsToggle.addEventListener('click', () => {
                settingsPanel.classList.toggle('open');
                settingsToggle.classList.toggle('open');
            });

            // Settings controls
            document.getElementById('translucencyEnabled').addEventListener('change', updateVisualization);
            document.getElementById('fadeByDistance').addEventListener('change', updateVisualization);
            document.getElementById('showPipelines').addEventListener('change', updatePipelineVisibility);
            document.getElementById('terrainAlpha').addEventListener('input', updateTerrainAlpha);
            document.getElementById('enableZoom').addEventListener('change', updateCameraControls);
            document.getElementById('enablePan').addEventListener('change', updateCameraControls);
            document.getElementById('enableRotate').addEventListener('change', updateCameraControls);

            // Initialize terrain alpha text
            const terrainAlphaRange = document.getElementById('terrainAlpha');
            const terrainAlphaText = document.getElementById('terrainAlphaText');
            terrainAlphaRange.addEventListener('input', () => {
                terrainAlphaText.value = terrainAlphaRange.value;
                updateVisualization();
            });
        }

        // GPS Functions
        function startGPS() {
            if (!("geolocation" in navigator)) {
                updateStatus("Geolocation not supported", true);
                return;
            }

            updateStatus("Requesting GPS access...");
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    gpsEnabled = true;
                    updateStatus("GPS enabled successfully");
                    updateButtonStates();
                    createUserLocationMarker(position.coords);
                    gpsWatchId = navigator.geolocation.watchPosition(
                        handleGPSUpdate,
                        handleGPSError,
                        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                    );
                },
                (error) => {
                    handleGPSError(error);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        function stopGPS() {
            if (gpsWatchId) {
                navigator.geolocation.clearWatch(gpsWatchId);
                gpsWatchId = null;
            }
            gpsEnabled = false;
            if (userLocationEntity) {
                viewer.entities.remove(userLocationEntity);
                userLocationEntity = null;
            }
            if (accuracyCircleEntity) {
                viewer.entities.remove(accuracyCircleEntity);
                accuracyCircleEntity = null;
            }
            updateStatus("GPS disabled");
            updateButtonStates();
        }

        function handleGPSUpdate(position) {
            const now = Date.now();
            if (now - lastSensorUpdateTime < SENSOR_UPDATE_INTERVAL) return;
            lastSensorUpdateTime = now;

            const { latitude, longitude, altitude, accuracy } = position.coords;
            updateStatus(`GPS: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}, Alt: ${altitude?.toFixed(1) || 'N/A'}m (±${accuracy.toFixed(1)}m)`);
            
            if (userLocationEntity) {
                userLocationEntity.position = Cesium.Cartesian3.fromDegrees(longitude, latitude, altitude || 0);
            }
            
            updateAccuracyCircle(latitude, longitude, altitude || 0, accuracy);
        }

        function handleGPSError(error) {
            let message = "GPS Error: ";
            switch(error.code) {
                case error.PERMISSION_DENIED: message += "Permission denied"; break;
                case error.POSITION_UNAVAILABLE: message += "Position unavailable"; break;
                case error.TIMEOUT: message += "Request timed out"; break;
                default: message += `Unknown error (${error.code})`;
            }
            updateStatus(message, true);
        }

        function createUserLocationMarker(coords) {
            userLocationEntity = viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(coords.longitude, coords.latitude, coords.altitude || 0),
                point: {
                    pixelSize: 15,
                    color: Cesium.Color.DODGERBLUE,
                    outlineColor: Cesium.Color.WHITE,
                    outlineWidth: 3,
                    disableDepthTestDistance: Infinity
                },
                label: {
                    text: 'You',
                    font: 'bold 16px sans-serif',
                    fillColor: Cesium.Color.DODGERBLUE,
                    outlineColor: Cesium.Color.WHITE,
                    outlineWidth: 2,
                    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    pixelOffset: new Cesium.Cartesian2(0, -20),
                    disableDepthTestDistance: Infinity
                }
            });
        }

        function updateAccuracyCircle(latitude, longitude, altitude, accuracy) {
            if (accuracyCircleEntity) {
                viewer.entities.remove(accuracyCircleEntity);
            }
            
            if (accuracy > 0 && accuracy < 200) {
                accuracyCircleEntity = viewer.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(longitude, latitude, altitude - 0.1),
                    ellipse: {
                        semiMinorAxis: accuracy,
                        semiMajorAxis: accuracy,
                        material: Cesium.Color.RED.withAlpha(0.1),
                        height: altitude - 0.1,
                        extrudedHeight: altitude,
                        outline: true,
                        outlineColor: Cesium.Color.RED.withAlpha(0.3),
                        classificationType: Cesium.ClassificationType.TERRAIN
                    }
                });
            }
        }

        // AR Functions
        function startAR() {
            if (typeof DeviceOrientationEvent === "undefined") {
                updateStatus("Device orientation not supported", true);
                return;
            }

            updateStatus("Requesting AR access...");
            const orientationEventName = 'ondeviceorientationabsolute' in window ? 'deviceorientationabsolute' : 'deviceorientation';

            if (typeof DeviceOrientationEvent.requestPermission === "function") {
                DeviceOrientationEvent.requestPermission()
                    .then(permission => {
                        if (permission === "granted") {
                            setupOrientationListener(orientationEventName);
                        } else {
                            updateStatus("AR permission denied", true);
                        }
                    })
                    .catch(error => {
                        updateStatus(`AR permission error: ${error.message}`, true);
                    });
            } else {
                setupOrientationListener(orientationEventName);
            }
        }

        function setupOrientationListener(eventName) {
            window.addEventListener(eventName, handleDeviceOrientation, true);
            orientationListenerAttached = true;
            arEnabled = true;
            updateStatus("AR mode enabled");
            updateButtonStates();
        }

        function stopAR() {
            if (orientationListenerAttached) {
                window.removeEventListener('deviceorientation', handleDeviceOrientation, true);
                window.removeEventListener('deviceorientationabsolute', handleDeviceOrientation, true);
                orientationListenerAttached = false;
            }
            arEnabled = false;
            updateStatus("AR mode disabled");
            updateButtonStates();
        }

        function handleDeviceOrientation(event) {
            if (!arEnabled) return;

            const now = Date.now();
            if (now - lastSensorUpdateTime < AR_SENSOR_UPDATE_INTERVAL) return;
            lastSensorUpdateTime = now;

            let alpha = event.alpha;
            if (isIOS && event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== null) {
                alpha = event.webkitCompassHeading;
            }

            if (alpha !== null) {
                currentHeading = alpha;
            }

            if (event.beta !== null) {
                currentPitch = event.beta - 90;
            }

            if (event.gamma !== null) {
                currentRoll = event.gamma;
            }

            updateCameraOrientation();
        }

        function updateCameraOrientation() {
            if (!arEnabled) return;

            const camera = viewer.camera;
            const currentPosition = camera.position;
            const cartographic = Cesium.Cartographic.fromCartesian(currentPosition);
            
            camera.setView({
                destination: currentPosition,
                orientation: {
                    heading: Cesium.Math.toRadians(currentHeading),
                    pitch: Cesium.Math.toRadians(currentPitch),
                    roll: Cesium.Math.toRadians(currentRoll)
                }
            });
        }

        function calibrateCompass() {
            if (!arEnabled) {
                updateStatus("Enable AR mode first", true);
                return;
            }
            updateStatus("Calibrating compass... Point device North and hold steady");
            setTimeout(() => {
                updateStatus("Compass calibrated");
            }, 2000);
        }

        // Underground Mode Functions
        function toggleUndergroundMode() {
            undergroundMode = !undergroundMode;
            const undergroundBtn = document.getElementById('undergroundBtn');
            const undergroundIndicator = document.getElementById('undergroundIndicator');
            
            if (undergroundMode) {
                undergroundBtn.innerHTML = '<i class="fas fa-eye-slash"></i>';
                undergroundBtn.title = 'Exit Underground View';
                undergroundIndicator.classList.add('show');
                document.body.classList.add('underground-mode');
                updateStatus("Underground mode enabled");
            } else {
                undergroundBtn.innerHTML = '<i class="fas fa-eye"></i>';
                undergroundBtn.title = 'Toggle Underground View';
                undergroundIndicator.classList.remove('show');
                document.body.classList.remove('underground-mode');
                updateStatus("Underground mode disabled");
            }
        }

        // Pipeline Functions
        function createPipelines() {
            const pipelineData = [
                {
                    url: "https://varun:8443/geoserver/Hilltop_pipelines/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=Hilltop_pipelines%3APOLYLINE&maxFeatures=50&outputFormat=application%2Fjson",
                    color: Cesium.Color.ORANGERED,
                    depth: -20,
                    name: "Main Pipeline",
                    type: "Water Supply",
                    diameter: "300mm"
                },
                {
                    url: "https://varun:8443/geoserver/Hilltop_pipelines/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=Hilltop_pipelines%3AHilltop_pipeline2&maxFeatures=50&outputFormat=application%2Fjson",
                    color: Cesium.Color.DEEPSKYBLUE,
                    depth: -5,
                    name: "Secondary Pipeline",
                    type: "Gas Supply",
                    diameter: "200mm"
                },
                {
                    url: "https://varun:8443/geoserver/Hilltop_pipelines/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=Hilltop_pipelines%3AHilltop_Pipeline3&maxFeatures=50&outputFormat=application%2Fjson",
                    color: Cesium.Color.RED,
                    depth: -10,
                    name: "Emergency Pipeline",
                    type: "Emergency Supply",
                    diameter: "150mm"
                }
            ];

            pipelineData.forEach(pipeline => {
                fetchPipeline(pipeline);
            });
        }

        function fetchPipeline(pipelineData) {
            updateStatus("Loading pipeline data...");
            fetch(pipelineData.url)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    if (!data.features || data.features.length === 0) {
                        updateStatus("No pipeline features found", true);
                        return;
                    }
                    
                    data.features.forEach(feature => {
                        if (feature.geometry && feature.geometry.coordinates) {
                            createPipelineEntity(feature.geometry.coordinates, pipelineData);
                        }
                    });
                    
                    updateStatus(`Pipelines loaded (${data.features.length} features)`);
                })
                .catch(error => {
                    console.error("Pipeline load failed:", error);
                    updateStatus(`Pipeline load failed: ${error.message}`, true);
                });
        }

        function createPipelineEntity(coordinates, pipelineData) {
            const pipeRadius = 0.5;
            const pipeSegments = 16;
            const circleShape = [];
            
            for (let i = 0; i < pipeSegments; i++) {
                const angle = (i / pipeSegments) * Cesium.Math.TWO_PI;
                circleShape.push(new Cesium.Cartesian2(
                    pipeRadius * Math.cos(angle),
                    pipeRadius * Math.sin(angle)
                ));
            }

            const positions = coordinates.map(coord => 
                Cesium.Cartesian3.fromDegrees(coord[0], coord[1], pipelineData.depth)
            );

            const entity = viewer.entities.add({
                polylineVolume: {
                    positions: positions,
                    shape: circleShape,
                    material: pipelineData.color.withAlpha(0.9),
                    outline: true,
                    outlineColor: pipelineData.color.withAlpha(1.0)
                },
                pipelineInfo: pipelineData
            });

            pipelineEntities.push(entity);
        }

        function updatePipelineVisibility() {
            const showPipelines = document.getElementById('showPipelines').checked;
            pipelineEntities.forEach(entity => {
                entity.show = showPipelines;
            });
            viewer.scene.requestRender();
        }

        // Visualization Functions
        function updateVisualization() {
            const translucencyEnabled = document.getElementById('translucencyEnabled').checked;
            const fadeByDistance = document.getElementById('fadeByDistance').checked;
            const terrainAlpha = parseFloat(document.getElementById('terrainAlpha').value);

            globe.translucency.enabled = translucencyEnabled;
            
            if (globe.translucency.frontFaceAlphaByDistance) {
                globe.translucency.frontFaceAlphaByDistance.nearValue = terrainAlpha;
                globe.translucency.frontFaceAlphaByDistance.nearDistance = 400.0;
                globe.translucency.frontFaceAlphaByDistance.farValue = fadeByDistance ? 1.0 : terrainAlpha;
                globe.translucency.frontFaceAlphaByDistance.farDistance = 800.0;
            } else {
                globe.translucency.frontFaceAlphaByDistance = new Cesium.NearFarScalar(
                    400.0, terrainAlpha, 800.0, fadeByDistance ? 1.0 : terrainAlpha
                );
            }

            viewer.scene.requestRender();
        }

        function updateTerrainAlpha() {
            const terrainAlpha = document.getElementById('terrainAlpha').value;
            document.getElementById('terrainAlphaText').value = terrainAlpha;
            updateVisualization();
        }

        // Camera Control Functions
        function updateCameraControls() {
            const enableZoom = document.getElementById('enableZoom').checked;
            const enablePan = document.getElementById('enablePan').checked;
            const enableRotate = document.getElementById('enableRotate').checked;

            const controller = viewer.scene.screenSpaceCameraController;
            controller.enableZoom = enableZoom;
            controller.enableLook = enablePan;
            controller.enableRotate = enableRotate;
            controller.enableTilt = enableRotate;
            controller.enableTranslate = enablePan;
        }

        // Button State Management
        function updateButtonStates() {
            const gpsBtn = document.getElementById('gpsBtn');
            const arBtn = document.getElementById('arBtn');
            const calibrateBtn = document.getElementById('calibrateBtn');

            gpsBtn.classList.toggle('active', gpsEnabled);
            arBtn.classList.toggle('active', arEnabled);
            calibrateBtn.style.display = arEnabled ? 'block' : 'none';
        }

        // Pipeline Click Handler
        function setupPipelineClickHandler() {
            viewer.screenSpaceEventHandler.setInputAction((movement) => {
                const pickedObject = viewer.scene.pick(movement.position);
                if (Cesium.defined(pickedObject) && pickedObject.id && pickedObject.id.polylineVolume) {
                    showPipelineInfo(pickedObject.id);
                }
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
        }

        function showPipelineInfo(entity) {
            const pipelineInfo = document.getElementById('pipelineInfo');
            const pipelineTitle = document.getElementById('pipelineTitle');
            const pipelineDetails = document.getElementById('pipelineDetails');
            
            if (entity.pipelineInfo) {
                const info = entity.pipelineInfo;
                pipelineTitle.textContent = info.name;
                
                pipelineDetails.innerHTML = `
                    <div class="info-item">
                        <span class="info-label">Type:</span>
                        <span class="info-value">${info.type}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Diameter:</span>
                        <span class="info-value">${info.diameter}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Depth:</span>
                        <span class="info-value">${Math.abs(info.depth)}m below surface</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Color:</span>
                        <span class="info-value">${info.color.toCssColorString()}</span>
                    </div>
                `;
                
                pipelineInfo.classList.add('show');
            }
        }

        function closePipelineInfo() {
            document.getElementById('pipelineInfo').classList.remove('show');
        }

        // Initialize everything
        function initialize() {
            initializeViewer();
            initializeControls();
            createPipelines();
            setupPipelineClickHandler();
            updateVisualization();
            updateCameraControls();
            updateButtonStates();
            
            // Set initial camera position
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(79.0882, 21.1458, 5000),
                orientation: {
                    heading: Cesium.Math.toRadians(0),
                    pitch: Cesium.Math.toRadians(-80),
                    roll: 0.0
                },
                duration: 0.0
            });

            updateStatus("AR Pipeline Viewer ready. Use controls to enable GPS/AR modes.");
        }

        // Start initialization when page loads
        window.addEventListener('load', initialize);
    </script>
</body>
</html>

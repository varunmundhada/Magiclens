<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cesium AR Pipeline Viewer - Translucent Globe & Full AR/GPS</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.129/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.129/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
    <style>
        html, body, #cesiumContainer {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            touch-action: none;
        }
        .control-btn {
            position: relative;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 10px;
            border-radius: 8px;
            font-weight: bold;
            border: 2px solid #444;
            font-size: 12px;
            min-width: 160px;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
            margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; gap: 6px; /* NEW: flex for icon+text */
        }
        .control-btn .icon { font-size: 1.2em; }
        .hidden { display: none !important; }
        .ui-hidden { display: none !important; }
        #toggleUiBtn {
            position: absolute; bottom: 45px; right: 15px; z-index: 21;
            width: 48px; height: 48px; background: rgba(0,0,0,0.6);
            border: 2px solid #fff; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #toggleUiBtn:hover { background: rgba(0,0,0,0.8); }
        #toggleUiBtn svg { width: 28px; height: 28px; fill: #fff; }
        .control-btn:hover { background: rgba(230, 230, 230, 0.95); }
        .control-btn:active { background: rgba(200, 200, 200, 0.95); }
        .control-btn:disabled { background: #ccc; color: #666; cursor: not-allowed; border-color: #999; }

        #btnContainer {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        #status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 13px;
            text-align: center;
            pointer-events: none;
        }
        #toolbar {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 15;
            background: rgba(42, 42, 42, 0.8);
            padding: 10px;
            border-radius: 5px;
            color: white;
            font-family: sans-serif;
            font-size: 13px;
        }
        #toolbar table td { padding: 2px 5px; }
        #toolbar input[type="range"] { vertical-align: middle; }

        #cesiumContainer .cesium-viewer-toolbar, 
        #cesiumContainer .cesium-viewer-baseLayerPickerContainer, 
        #cesiumContainer .cesium-viewer-homeButtonContainer {
            z-index: 30 !important;
            pointer-events: auto !important;
        }
        /* On mobile, move custom toolbars lower to avoid overlapping Cesium widgets */
        @media (max-width: 600px) {
            #toolbar { top: 60px; left: 10px; right: 10px; }
            #btnContainer { top: 5px; left: 5px; right: 5px; }
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="btnContainer" class="hidable-ui">
        <button id="gpsBtn" class="control-btn"><span class="icon">🛰️</span>GPS</button>
        <button id="orientationBtn" class="control-btn"><span class="icon">📱</span>AR</button>
        <button id="calibrateBtn" class="control-btn hidden"><span class="icon">🧭</span>Calib</button>
        <button id="disableTrackingBtn" class="control-btn hidden"><span class="icon">🚫</span>Stop</button>
        <button id="settingsBtn" class="control-btn"><span class="icon">⚙️</span>Settings</button>
    </div>
    <div id="toolbar" class="hidable-ui hidden">
        <table>
            <tbody>
            <tr>
                <td>Translucency Enabled</td>
                <td><input type="checkbox" data-bind="checked: translucencyEnabled"></td>
            </tr>
            <tr>
                <td>Fade By Distance</td>
                <td><input type="checkbox" data-bind="checked: fadeByDistance"></td>
            </tr>
            <tr>
                <td>Show Pipelines</td>
                <td><input type="checkbox" data-bind="checked: showVectorData"></td>
            </tr>
            <tr>
                <td>Terrain Alpha</td>
                <td>
                    <input type="range" min="0" max="1" step="0.01" data-bind="value: alpha, valueUpdate: 'input'">
                    <input type="text" size="2" data-bind="value: alpha">
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div id="status">Initializing... Please ensure HTTPS.</div>
    <button id="toggleUiBtn" title="Toggle UI Visibility"></button>
    <script>
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5Y2ZiMzU0Mi00NjkyLTQxZjctOGNjZC02YjgyYzliOTEwNGYiLCJpZCI6Mjk2ODk1LCJpYXQiOjE3NDc2NTc5MzZ9.Mb95-v_3Pm4NQQohnck02L-zmHD4SWj5vv57m0fP4ig'; // Or 'YOUR_CESIUM_ION_ACCESS_TOKEN'

        const isWebView = /(WebView|Android|iPhone|iPad|iPod)/i.test(navigator.userAgent);
        const isIOS = /(iPhone|iPad|iPod)/i.test(navigator.userAgent);

        let lastStatusUpdateTime = 0;
        let lastStatusIsError = false;
        const MIN_ERROR_DISPLAY_TIME = 5000;

        function updateStatus(message, isError = false) {
            const now = Date.now();
            if (lastStatusIsError && !isError && (now - lastStatusUpdateTime < MIN_ERROR_DISPLAY_TIME)) {
                return;
            }
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.style.color = isError ? 'yellow' : 'white';
            if (isError) console.error(message); else console.log(message);
            lastStatusUpdateTime = now;
            lastStatusIsError = isError;
        }

        updateStatus(`Cesium AR Viewer. Env: ${isWebView ? 'WebView' : 'Browser'} ${isIOS ? 'iOS' : ''}. HTTPS for sensors.`);

        const enhancedImageryProvider = Cesium.IonImageryProvider.fromAssetId(4); // Blue Marble

        var viewer = new Cesium.Viewer("cesiumContainer", {
            terrainProvider: Cesium.Terrain.fromWorldTerrain(),
            imageryProvider: enhancedImageryProvider,
            baseLayerPicker: true,
            shouldAnimate: true,
            sceneMode: Cesium.SceneMode.SCENE3D,
            vrButton: false, geocoder: false, homeButton: true,
            scene3DOnly: true, selectionIndicator: false, infoBox: false,
            animation: false, timeline: false,
            requestRenderMode: true,
            maximumRenderTimeChange: Infinity,
            contextOptions: { webgl: { alpha: false, antialias: true, depth: true, stencil: false, powerPreference: "high-performance"}},
            msaaSamples: 4
        });

        viewer.scene.camera.frustum.near = 0.01;
        viewer.scene.camera.frustum.fov = Cesium.Math.toRadians(70);

        const scene = viewer.scene;
        const globe = scene.globe;

        scene.skyAtmosphere.show = true;
        scene.fog.enabled = true;
        scene.fog.density = 0.00005;
        scene.fog.minimumBrightness = 0.03;

        globe.enableLighting = true;
        viewer.shadows = true;
        scene.highDynamicRange = false; // Tuned for translucency

        if (scene.postProcessStages.bloom && !scene.highDynamicRange) {
            scene.postProcessStages.bloom.enabled = true;
            scene.postProcessStages.bloom.uniforms.contrast = 110;
            scene.postProcessStages.bloom.uniforms.brightness = -0.05;
        } else if (scene.postProcessStages.bloom && scene.highDynamicRange) {
             scene.postProcessStages.bloom.enabled = true;
             scene.postProcessStages.bloom.uniforms.contrast = 128;
             scene.postProcessStages.bloom.uniforms.brightness = -0.1;
        }

        scene.screenSpaceCameraController.enableCollisionDetection = false;
        viewer.scene.screenSpaceCameraController.enableTilt = true;

        globe.undergroundColor = Cesium.Color.BLACK;
        globe.depthTestAgainstTerrain = true;

        viewer.scene.primitives.add(new Cesium.Cesium3DTileset({
            url: Cesium.IonResource.fromAssetId(96188),
            maximumScreenSpaceError: isWebView ? 8 : 4
        }));

        const circleShape = [];
        const pipeRadius = 0.5;
        const pipeSegments = 16;
        for (let i = 0; i < pipeSegments; i++) {
            const angle = (i / pipeSegments) * Cesium.Math.TWO_PI;
            circleShape.push(new Cesium.Cartesian2(pipeRadius * Math.cos(angle), pipeRadius * Math.sin(angle)));
        }

        const pipelineEntities = [];
        function drawPipeline(coordinates, color, depth) {
            if (!coordinates || coordinates.length < 2) { return; }
            const labelText = `Pipeline (${Math.abs(depth)}m)`;
            const pipelineEntity = viewer.entities.add({
                polylineVolume: {
                    positions: coordinates.map(([lon, lat]) => Cesium.Cartesian3.fromDegrees(lon, lat, depth)),
                    shape: circleShape,
                    material: color.withAlpha(0.9),
                    depthFailMaterial: color.withAlpha(0.9), /* NEW ensure visible when occluded */
                    outline: false
                },
                label: {
                    text: labelText,
                    font: 'bold 12px sans-serif',
                    fillColor: color.withAlpha(0.9),
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    pixelOffset: new Cesium.Cartesian2(0, -10),
                    show: false,
                    disableDepthTestDistance: Infinity
                }
            });
            pipelineEntities.push(pipelineEntity);
        }

        // REMOVE ZOOM THRESHOLD LOGIC & SIMPLIFY VISIBILITY
        let lastPipelineVisibilityState = null;
        function updatePipelineVisibilityBasedOnZoom() {
            const shouldShow = viewModel.showVectorData;
            if (shouldShow !== lastPipelineVisibilityState) {
                pipelineEntities.forEach(e => { e.show = shouldShow; });
                lastPipelineVisibilityState = shouldShow;
                if (viewer.scene.requestRenderMode) viewer.scene.requestRender();
            }
        }

        function onCameraChangedCombined() {
            // Retain AR pitch override logic if needed
            if (orientationEnabled) {
                const currentCameraPitchRad = viewer.camera.pitch;
                if (Math.abs(currentCameraPitchRad - previousCameraPitch) > Cesium.Math.toRadians(0.5)) {
                    const sensorDrivenPitchRad = Cesium.Math.toRadians(currentPitch);
                    if (Math.abs(currentCameraPitchRad - sensorDrivenPitchRad) > Cesium.Math.toRadians(2.0)) {
                        currentPitch = Cesium.Math.toDegrees(currentCameraPitchRad);
                        lastUserPitchInteractionTime = Date.now();
                    }
                }
                previousCameraPitch = currentCameraPitchRad;
            }
            updatePipelineVisibilityBasedOnZoom();
        }
        viewer.camera.changed.addEventListener(onCameraChangedCombined);

        function fetchPipeline(url, color, depth) {
            updateStatus("Loading pipeline data...");
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status} fetching ${url}. Check GeoServer CORS/SSL.`);
                    return response.json();
                })
                .then(({ features }) => {
                    if (!features || features.length === 0) { updateStatus("No pipeline features found.", true); return; }
                    features.forEach(({ geometry }) => {
                        if (!geometry || !geometry.coordinates) return;
                        const segments = geometry.type === "LineString" ? [geometry.coordinates] : geometry.coordinates;
                        segments.forEach(coords => {
                            if (Array.isArray(coords) && coords.length > 0 && Array.isArray(coords[0])) {
                                drawPipeline(coords, color, depth);
                            }
                        });
                    });
                    updateStatus(`Pipelines loaded (${features.length} features).`);
                    updateTranslucencyAndVectorData();
                    updatePipelineVisibilityBasedOnZoom(); // Ensure correct visibility after loading
                    viewer.scene.requestRender();
                })
                .catch(err => {
                    console.error(`Pipeline load failed: ${url}`, err);
                    updateStatus(`Pipeline load fail: ${err.message}. Check console & GeoServer.`, true);
                });
        }

        fetchPipeline(
            "https://varun:8443/geoserver/Hilltop_pipelines/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=Hilltop_pipelines%3APOLYLINE&maxFeatures=50&outputFormat=application%2Fjson",
            Cesium.Color.ORANGERED, -20
        );
        fetchPipeline(
            "https://varun:8443/geoserver/Hilltop_pipelines/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=Hilltop_pipelines%3AHilltop_pipeline2&maxFeatures=50&outputFormat=application%2Fjson",
            Cesium.Color.DEEPSKYBLUE, -5
        );
        fetchPipeline(
            "https://varun:8443/geoserver/Hilltop_pipelines/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=Hilltop_pipelines%3AHilltop_Pipeline3&maxFeatures=50&outputFormat=application%2Fjson",
            Cesium.Color.RED, -10
        );

        viewer.screenSpaceEventHandler.setInputAction((movement) => {
            const pickedObject = viewer.scene.pick(movement.position);
            if (Cesium.defined(pickedObject) && pickedObject.id && pickedObject.id.polylineVolume) {
                // Hide previous labels & show current
                pipelineEntities.forEach(en => { if (en.label) en.label.show = false; });
                pickedObject.id.label && (pickedObject.id.label.show = true);
                updateStatus("Flying to selected pipeline segment...");
                const entity = pickedObject.id;
                const pvol = entity.polylineVolume;
                const positions = pvol.positions.getValue(viewer.clock.currentTime || Cesium.JulianDate.now());

                if (positions && positions.length > 0) {
                    const firstPosCartesian = positions[0];
                    const cartographic = Cesium.Cartographic.fromCartesian(firstPosCartesian);
                    const clickLon = Cesium.Math.toDegrees(cartographic.longitude);
                    const clickLat = Cesium.Math.toDegrees(cartographic.latitude);
                    const pipelineDepth = cartographic.height;

                    viewer.camera.flyTo({
                        destination: Cesium.Cartesian3.fromDegrees(clickLon, clickLat, Math.abs(pipelineDepth) + 25),
                        orientation: { heading: Cesium.Math.toRadians(0), pitch: Cesium.Math.toRadians(-90), roll: 0.0 },
                        duration: 2.0,
                        complete: () => { updateStatus("Flown to selected pipeline segment (top-down view)."); viewer.scene.requestRender(); },
                        cancel: () => { updateStatus("Pipeline fly-to cancelled."); viewer.scene.requestRender(); }
                    });
                } else { updateStatus("Could not get pipeline position for fly-to.", true); }
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        const toRad = deg => Cesium.Math.toRadians(deg || 0);

        let lat = 21.1458, lon = 79.0882, alt = 30;
        let currentHeading = 0, currentPitch = -30, currentRoll = 0;
        let gpsWatchId = null, orientationListenerAttached = false;
        let gpsEnabled = false, orientationEnabled = false, justActivatedARMode = false;
        let userLocationEntity = null, accuracyCircleEntity = null;
        let lastSensorUpdateTime = 0, lastCompassWarningTime = 0, lastCompassAccuracyWarningTime = 0;
        let lastUserPitchInteractionTime = 0;
        const USER_PITCH_OVERRIDE_DURATION = 2000;

        const SENSOR_UPDATE_INTERVAL = 100;
        const AR_SENSOR_UPDATE_INTERVAL = 50;
        const eyeHeightConst = 1.6;

        const gpsBtn = document.getElementById('gpsBtn');
        const orientationBtn = document.getElementById('orientationBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const disableTrackingBtn = document.getElementById('disableTrackingBtn');
        const settingsBtn = document.getElementById('settingsBtn'); /* NEW */
        const toggleUiBtn = document.getElementById('toggleUiBtn'); /* NEW */
        const hidableUiElements = document.querySelectorAll('.hidable-ui'); /* NEW */
        const eyeIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><path d="M288 80c-65.2 0-118.8 29.6-159.9 67.7C89.6 183.5 63 226 49.4 256c13.6 30 40.2 72.5 78.6 108.3C169.2 402.4 222.8 432 288 432s118.8-29.6 159.9-67.7C487.8 328.5 514.4 286 527 256c-13.6-30-40.2-72.5-78.6-108.3C406.8 109.6 353.2 80 288 80zM288 368c-59.4 0-107.6-48.2-107.6-107.6S228.6 152.8 288 152.8s107.6 48.2 107.6 107.6S347.4 368 288 368zm0-160c-28.7 0-51.6 23-51.6 51.6s23 51.6 51.6 51.6 51.6-23 51.6-51.6-22.9-51.6-51.6-51.6z"/></svg>`;
        const eyeSlashIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512"><path d="M38.8 5.1C28.4-3.1 13.3-1.2 5.1 9.2S-1.2 34.7 9.2 42.9l592 464c10.4 8.2 25.5 6.3 33.7-4.1s6.3-25.5-4.1-33.7L525.6 386.7C556.1 346.1 576 299.6 576 256c0-10.8-1-21.4-3-31.8l-7.7-27.1-22.3-78.8-22.1-78.3c-3.3-11.8-14.7-20-27.4-20H304.7l-44.1-34.6L38.8 5.1zM288 128c38.3 0 71.9 17.7 95.5 45.4l-52.6 41.3c-6.8-2-14-3.1-21.4-3.1-44.2 0-80 35.8-80 80 0 7.5 1 14.8 3.1 21.7l-41.3 52.6C145.7 322.1 128 290.3 128 256c0-43.2 17.1-82.9 45.4-112.5C201.1 130.1 242.3 128 288 128zM64 256c0 44.2 35.8 80 80 80 12.3 0 24-2.8 34.9-7.7l-44.5-35c-15.6-12.2-22.9-32.9-18.1-51.9l-22.3-17.5c-18.4 20.3-30.7 45.4-30.7 73.6z"/></svg>`;
        let isUiVisible = true;
        function toggleUiVisibility() {
            isUiVisible = !isUiVisible;
            hidableUiElements.forEach(el => el.classList.toggle('ui-hidden', !isUiVisible));
            toggleUiBtn.innerHTML = isUiVisible ? eyeIcon : eyeSlashIcon;
            viewer.scene.requestRender();
        }
        toggleUiBtn.addEventListener('click', toggleUiVisibility);
        window.addEventListener('load', () => { toggleUiBtn.innerHTML = eyeIcon; });
        settingsBtn.addEventListener('click', () => {
            toolbarElement.classList.toggle('hidden');
            viewer.scene.requestRender();
        });

        function updateButtonsState() {
            gpsBtn.style.display = gpsEnabled ? "none" : "block";
            orientationBtn.style.display = orientationEnabled ? "none" : "block";
            calibrateBtn.style.display = orientationEnabled ? "block" : "none";
            disableTrackingBtn.style.display = (gpsEnabled || orientationEnabled) ? "block" : "none";
            manageCameraControls();
            viewer.scene.requestRender();
        }

        function handlePositionUpdate(position) {
            const now = Date.now();
            if (now - lastSensorUpdateTime < SENSOR_UPDATE_INTERVAL && gpsEnabled) return;
            lastSensorUpdateTime = now;
            const oldLat = lat; const oldLon = lon;
            lat = position.coords.latitude; lon = position.coords.longitude;
            alt = position.coords.altitude !== null ? position.coords.altitude : 30;
            const accuracy = position.coords.accuracy;
            updateStatus(`GPS: ${lat.toFixed(5)}, ${lon.toFixed(5)}, Alt: ${alt.toFixed(1)}m (±${accuracy.toFixed(1)}m)`);
            const deltaLatDegrees = lat - oldLat; const deltaLonDegrees = lon - oldLon;
            updateCameraAndMarker(position.coords, deltaLatDegrees, deltaLonDegrees);
        }

        function handlePositionError(error) {
            let msg = "GPS Error: ";
            switch(error.code) {
                case error.PERMISSION_DENIED: msg += "Permission denied."; break;
                case error.POSITION_UNAVAILABLE: msg += "Position unavailable."; break;
                case error.TIMEOUT: msg += "Request timed out."; break;
                default: msg += `Unknown (Code: ${error.code}).`;
            }
            updateStatus(msg + " Ensure HTTPS & location services.", true);
        }

        function updateAccuracyCircle(latitude, longitude, altitudeAtUserFeet, accuracy) {
            if (accuracyCircleEntity) viewer.entities.remove(accuracyCircleEntity);
            accuracyCircleEntity = null;
            if (accuracy > 0 && accuracy < 200 && gpsEnabled) {
                accuracyCircleEntity = viewer.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(longitude, latitude, altitudeAtUserFeet - 0.1),
                    ellipse: {
                        semiMinorAxis: accuracy, semiMajorAxis: accuracy,
                        material: Cesium.Color.RED.withAlpha(0.1),
                        height: altitudeAtUserFeet - 0.1, extrudedHeight: altitudeAtUserFeet,
                        outline: true, outlineColor: Cesium.Color.RED.withAlpha(0.3),
                        classificationType: Cesium.ClassificationType.TERRAIN
                    }
                });
            }
        }

        function startLiveGPS() {
            if (gpsWatchId !== null || gpsEnabled) return;
            updateStatus("Requesting GPS access...");
            if (!("geolocation" in navigator)) { updateStatus("Geolocation API not supported.", true); gpsEnabled = false; updateButtonsState(); return; }
            navigator.geolocation.getCurrentPosition(
                (initialPosition) => {
                    updateStatus("Initial GPS fix acquired.");
                    gpsEnabled = true;
                    const oldLat = lat; const oldLon = lon;
                    lat = initialPosition.coords.latitude; lon = initialPosition.coords.longitude;
                    alt = initialPosition.coords.altitude !== null ? initialPosition.coords.altitude : 30;
                    const deltaLat = lat - oldLat; const deltaLon = lon - oldLon;
                    updateCameraAndMarker(initialPosition.coords, deltaLat, deltaLon);
                    updateButtonsState();
                    gpsWatchId = navigator.geolocation.watchPosition(handlePositionUpdate, handlePositionError,
                        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
                    if (!orientationEnabled) {
                        viewer.flyTo(userLocationEntity || Cesium.Cartesian3.fromDegrees(lon, lat, alt + 20), {
                            duration: 1.5, offset: new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-60), 0)
                        }).then(() => viewer.scene.requestRender());
                    }
                },
                (error) => { handlePositionError(error); gpsEnabled = false; updateButtonsState(); updateStatus("Failed initial GPS. Ensure HTTPS & permissions.", true); },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        function stopLiveGPS() {
            if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);
            gpsWatchId = null; gpsEnabled = false;
            if (accuracyCircleEntity) { viewer.entities.remove(accuracyCircleEntity); accuracyCircleEntity = null; }
            if (!orientationEnabled && userLocationEntity) userLocationEntity.show = false;
            updateStatus("GPS tracking stopped."); updateButtonsState();
        }

        let latestDeviceOrientationEventForCalib = null;
        let compassCalibrationOffset = 0.0;
        const SMOOTHING_FACTOR_H = 0.2;
        const SMOOTHING_FACTOR_PR = 0.3;
        const orientationEventName = 'ondeviceorientationabsolute' in window ? 'deviceorientationabsolute' : 'deviceorientation';
        let previousCameraPitch = viewer.camera.pitch;

        function onCameraChanged() {
            if (orientationEnabled) {
                const currentCameraPitchRad = viewer.camera.pitch;
                if (Math.abs(currentCameraPitchRad - previousCameraPitch) > Cesium.Math.toRadians(0.5)) {
                    const sensorDrivenPitchRad = Cesium.Math.toRadians(currentPitch);
                     if (Math.abs(currentCameraPitchRad - sensorDrivenPitchRad) > Cesium.Math.toRadians(2.0)) {
                        currentPitch = Cesium.Math.toDegrees(currentCameraPitchRad);
                        lastUserPitchInteractionTime = Date.now();
                    }
                }
                previousCameraPitch = currentCameraPitchRad;
            }
        }
        viewer.camera.changed.addEventListener(onCameraChanged);

        function handleDeviceOrientation(event) {
            if (!orientationEnabled) return;
            latestDeviceOrientationEventForCalib = event;
            const now = Date.now();
            if (now - lastSensorUpdateTime < AR_SENSOR_UPDATE_INTERVAL) return;
            lastSensorUpdateTime = now;
            let rawAlpha = event.alpha;
            if (isIOS && event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== null) {
                rawAlpha = event.webkitCompassHeading;
                if (event.webkitCompassAccuracy !== undefined && event.webkitCompassAccuracy < 0 && event.webkitCompassAccuracy > -100) {
                    if (Date.now() - (lastCompassAccuracyWarningTime || 0) > 10000) {
                        updateStatus("Poor compass accuracy. Wave device in a figure-8 to calibrate.", true);
                        lastCompassAccuracyWarningTime = Date.now();
                    }
                }
            }
            if (rawAlpha === null) {
                if (Date.now() - (lastCompassWarningTime || 0) > 7000) {
                    updateStatus("Compass heading N/A. Calibrate or check device sensors/interference.", true);
                    lastCompassWarningTime = Date.now();
                }
            }
            let newH = rawAlpha !== null ? (rawAlpha + compassCalibrationOffset % 360 + 360) % 360 : currentHeading;
            let newP_sensor = event.beta !== null ? (event.beta - 90) : currentPitch;
            let newR = event.gamma !== null ? event.gamma : currentRoll;
            let headDiff = newH - currentHeading;
            if (headDiff > 180) headDiff -= 360; else if (headDiff < -180) headDiff += 360;
            currentHeading = (currentHeading + SMOOTHING_FACTOR_H * headDiff % 360 + 360) % 360;
            if (Date.now() - lastUserPitchInteractionTime < USER_PITCH_OVERRIDE_DURATION) {
                 currentPitch = (1 - (SMOOTHING_FACTOR_PR * 0.5)) * currentPitch + (SMOOTHING_FACTOR_PR * 0.5) * newP_sensor;
            } else {
                currentPitch = (1 - SMOOTHING_FACTOR_PR) * currentPitch + SMOOTHING_FACTOR_PR * newP_sensor;
            }
            currentRoll = (1 - SMOOTHING_FACTOR_PR) * currentRoll + SMOOTHING_FACTOR_PR * newR;
            updateCameraAndMarker(null, 0, 0);
        }

        function startOrientation() {
            if (orientationListenerAttached || orientationEnabled) return;
            updateStatus("Requesting AR (Device Orientation) access...");
            justActivatedARMode = true;
            previousCameraPitch = viewer.camera.pitch;
            const setupListener = () => {
                window.addEventListener(orientationEventName, handleDeviceOrientation, true);
                orientationListenerAttached = true; orientationEnabled = true;
                lastUserPitchInteractionTime = 0;
                updateButtonsState();
                updateStatus("AR Mode active. Tilt with touch. Calibrate if needed.");
                if (!gpsEnabled) {
                    const initialDest = Cesium.Cartesian3.fromDegrees(lon, lat, alt + eyeHeightConst);
                    viewer.camera.flyTo({
                        destination: initialDest,
                        orientation: { heading: toRad(currentHeading), pitch: toRad(currentPitch), roll: toRad(currentRoll) },
                        duration: 0.5
                    }).then(() => { updateCameraAndMarker(); });
                } else { updateCameraAndMarker(); }
            };
            if (typeof DeviceOrientationEvent !== "undefined") {
                if (typeof DeviceOrientationEvent.requestPermission === "function") {
                    DeviceOrientationEvent.requestPermission()
                        .then(r => {
                            if (r === "granted") setupListener();
                            else { updateStatus("Device Orientation permission denied.", true); orientationEnabled = false; justActivatedARMode = false; updateButtonsState(); }
                        }).catch(err => { updateStatus("Orientation permission request error: " + err.message, true); orientationEnabled = false; justActivatedARMode = false; updateButtonsState(); });
                } else setupListener();
            } else { updateStatus("Device Orientation API not supported.", true); orientationEnabled = false; justActivatedARMode = false; updateButtonsState(); }
        }

        function stopOrientation() {
            if (orientationListenerAttached) window.removeEventListener(orientationEventName, handleDeviceOrientation, true);
            orientationListenerAttached = false; orientationEnabled = false;
            justActivatedARMode = false; lastUserPitchInteractionTime = 0;
            if (gpsEnabled) {
                currentPitch = -30; updateCameraAndMarker();
            } else {
                viewer.camera.flyTo({
                    destination: new Cesium.Cartesian3.fromDegrees(79.075, 21.13, 5000), // Revert to initial general view
                    orientation: { heading: toRad(0), pitch: toRad(-80), roll: 0.0 }, duration: 1.0,
                }).then(() => viewer.scene.requestRender());
            }
            updateStatus("AR mode disabled. Manual camera control (including tilt) restored.");
            updateButtonsState();
            if (!gpsEnabled && userLocationEntity) userLocationEntity.show = false;
        }

        function calibrateCompass() {
            if (!orientationEnabled) { updateStatus("Enable AR mode first to calibrate.", true); return; }
            if (!latestDeviceOrientationEventForCalib) { updateStatus("No orientation data for calibration. Move device.", true); return; }
            updateStatus("Calibrating: Point device physically North and hold steady...", false);
            setTimeout(() => {
                let rawAlpha = latestDeviceOrientationEventForCalib.alpha;
                if (isIOS && latestDeviceOrientationEventForCalib.webkitCompassHeading !== undefined && latestDeviceOrientationEventForCalib.webkitCompassHeading !== null) {
                    rawAlpha = latestDeviceOrientationEventForCalib.webkitCompassHeading;
                }
                if (rawAlpha === null) { updateStatus("Calibration failed: No compass heading in event.", true); return; }
                compassCalibrationOffset = (-rawAlpha % 360 + 360) % 360;
                updateStatus(`Compass calibrated. Offset: ${compassCalibrationOffset.toFixed(1)}°. Current direction set as North.`, false);
                currentHeading = 0; lastUserPitchInteractionTime = 0;
                handleDeviceOrientation(latestDeviceOrientationEventForCalib);
            }, 1500);
        }
        calibrateBtn.onclick = calibrateCompass;

        function processCameraLogic(groundAltAtCameraXY, camLonForProcessing, camLatForProcessing, cameraHeightForProcessing, baseMarkerAltitudeAtGps, currentGpsAltArg, currentGpsLatFromArg) {
            let camDestToSet, camOrientationToSet;
            let finalCamHeight = cameraHeightForProcessing;
            if (orientationEnabled) {
                camDestToSet = Cesium.Cartesian3.fromDegrees(camLonForProcessing, camLatForProcessing, finalCamHeight);
                camOrientationToSet = { heading: toRad(currentHeading), pitch: toRad(currentPitch), roll: toRad(currentRoll) };
            } else {
                camDestToSet = Cesium.Cartesian3.fromDegrees(camLonForProcessing, camLatForProcessing, finalCamHeight);
                camOrientationToSet = { heading: viewer.camera.heading, pitch: viewer.camera.pitch, roll: viewer.camera.roll };
            }
            viewer.camera.setView({ destination: camDestToSet, orientation: camOrientationToSet });
            if (justActivatedARMode && orientationEnabled) { justActivatedARMode = false; }
            viewer.scene.requestRender();
        }

        function updateCameraAndMarker(gpsFullCoords = null, deltaLatDegrees = 0, deltaLonDegrees = 0) {
            let currentGpsLatArg = gpsFullCoords ? gpsFullCoords.latitude : null;
            let currentGpsLonArg = gpsFullCoords ? gpsFullCoords.longitude : null;
            let currentGpsAltArg = gpsFullCoords ? gpsFullCoords.altitude : null;
            let currentGpsAccuracy = gpsFullCoords ? gpsFullCoords.accuracy : 0;
            const effectiveGpsLat = currentGpsLatArg !== null ? currentGpsLatArg : lat;
            const effectiveGpsLon = currentGpsLonArg !== null ? currentGpsLonArg : lon;
            const effectiveGpsAlt = currentGpsAltArg !== null ? currentGpsAltArg : alt;
            const cartographicGpsGroundPos = [Cesium.Cartographic.fromDegrees(effectiveGpsLon, effectiveGpsLat)];
            let markerAltPromise;

            if (effectiveGpsAlt === null || !isFinite(effectiveGpsAlt) || effectiveGpsAlt < -500 || effectiveGpsAlt > 8900) {
                if (viewer.terrainProvider && viewer.terrainProvider.ready) {
                    markerAltPromise = Cesium.sampleTerrainMostDetailed(viewer.terrainProvider, cartographicGpsGroundPos)
                        .then(s => (s && s[0] && s[0].height !== undefined) ? s[0].height : 0)
                        .catch((err) => { console.error("Error sampling terrain for GPS marker:", err); return 0; });
                } else { markerAltPromise = Promise.resolve(0); }
            } else { markerAltPromise = Promise.resolve(effectiveGpsAlt); }

            markerAltPromise.then(function(baseMarkerAltitudeAtGps) {
                const markerPosition = Cesium.Cartesian3.fromDegrees(effectiveGpsLon, effectiveGpsLat, baseMarkerAltitudeAtGps);
                if (gpsEnabled || orientationEnabled) {
                    const currentCamCarto = viewer.camera.positionCartographic ? Cesium.Cartographic.clone(viewer.camera.positionCartographic) : undefined;
                    let camLatForProcessing, camLonForProcessing, camHeightForProcessing;
                    if (justActivatedARMode || !currentCamCarto || !isFinite(currentCamCarto.longitude) || !isFinite(currentCamCarto.latitude)) {
                        camLatForProcessing = effectiveGpsLat; camLonForProcessing = effectiveGpsLon;
                        if (orientationEnabled) {
                             const arGroundReferenceAlt = (effectiveGpsAlt !== null && isFinite(effectiveGpsAlt)) ? effectiveGpsAlt : baseMarkerAltitudeAtGps;
                             camHeightForProcessing = arGroundReferenceAlt + eyeHeightConst;
                        } else { camHeightForProcessing = currentCamCarto && isFinite(currentCamCarto.height) ? currentCamCarto.height : baseMarkerAltitudeAtGps + 20; }
                    } else {
                        camLonForProcessing = Cesium.Math.toDegrees(currentCamCarto.longitude);
                        camLatForProcessing = Cesium.Math.toDegrees(currentCamCarto.latitude);
                        camHeightForProcessing = currentCamCarto.height;
                        if (gpsEnabled && (deltaLatDegrees !== 0 || deltaLonDegrees !== 0) && gpsFullCoords ) {
                            camLatForProcessing += deltaLatDegrees; camLonForProcessing += deltaLonDegrees;
                        }
                    }
                    if (!isFinite(camLonForProcessing) || !isFinite(camLatForProcessing) || Math.abs(camLatForProcessing) > 90 || Math.abs(camLonForProcessing) > 180) {
                        console.error("INVALID camLon/Lat for terrain sampling. Resetting to GPS location.");
                        camLatForProcessing = effectiveGpsLat; camLonForProcessing = effectiveGpsLon;
                        camHeightForProcessing = (orientationEnabled ? baseMarkerAltitudeAtGps + eyeHeightConst : baseMarkerAltitudeAtGps + 20);
                    }
                    const cartoCamXY = [Cesium.Cartographic.fromDegrees(camLonForProcessing, camLatForProcessing)];
                    if (!viewer.terrainProvider || !viewer.terrainProvider.ready) {
                        console.warn("Terrain provider not ready for camera XY altitude sampling.");
                        processCameraLogic(baseMarkerAltitudeAtGps, camLonForProcessing, camLatForProcessing, camHeightForProcessing, baseMarkerAltitudeAtGps, effectiveGpsAlt, currentGpsLatArg);
                        return;
                    }
                    Cesium.sampleTerrainMostDetailed(viewer.terrainProvider, cartoCamXY)
                        .then(sampledCamTerrain => {
                            const groundAltAtCameraXY = (sampledCamTerrain && sampledCamTerrain[0] && sampledCamTerrain[0].height !== undefined) ? sampledCamTerrain[0].height : 0;
                            processCameraLogic(groundAltAtCameraXY, camLonForProcessing, camLatForProcessing, camHeightForProcessing, baseMarkerAltitudeAtGps, effectiveGpsAlt, currentGpsLatArg);
                        }).catch(err => {
                            console.error("Error sampling terrain for camera's XY position:", err);
                            processCameraLogic(baseMarkerAltitudeAtGps, camLonForProcessing, camLatForProcessing, camHeightForProcessing, baseMarkerAltitudeAtGps, effectiveGpsAlt, currentGpsLatArg);
                        });
                }
                if (gpsEnabled && gpsFullCoords) {
                    if (!userLocationEntity) {
                        userLocationEntity = viewer.entities.add({
                            position: markerPosition,
                            point: { pixelSize: 12, color: Cesium.Color.DODGERBLUE, outlineColor: Cesium.Color.WHITE, outlineWidth: 2, disableDepthTestDistance: Infinity },
                            label: { text: 'You', font: 'bold 14px sans-serif', fillColor: Cesium.Color.DODGERBLUE, outlineColor: Cesium.Color.WHITE, outlineWidth: 2, style: Cesium.LabelStyle.FILL_AND_OUTLINE, verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -15), disableDepthTestDistance: Infinity }
                        });
                    } else { userLocationEntity.position = markerPosition; }
                    userLocationEntity.show = true;
                    updateAccuracyCircle(effectiveGpsLat, effectiveGpsLon, baseMarkerAltitudeAtGps, currentGpsAccuracy);
                } else if (userLocationEntity && !gpsEnabled && !orientationEnabled) { userLocationEntity.show = false; }
            }).catch(err => { console.error("Error in markerAltPromise chain:", err); });
        }

        gpsBtn.onclick = function() { startLiveGPS(); };
        orientationBtn.onclick = function() { currentPitch = -65; lastUserPitchInteractionTime = 0; startOrientation(); };
        disableTrackingBtn.onclick = function() { stopLiveGPS(); stopOrientation(); updateStatus("All tracking disabled. Manual camera control (including tilt) restored."); };

        function manageCameraControls() {
            // Always enable all camera controls, including pan/translate, in all modes
            const ssc = viewer.scene.screenSpaceCameraController;
            ssc.enableInputs = true;
            ssc.enableZoom = true;
            ssc.enableLook = true;
            ssc.enableRotate = true;
            ssc.enableTilt = true;
            ssc.enableTranslate = true; // Pan (left/right/up/down) always enabled
            viewer.scene.requestRender();
        }

        const viewModel = {
            translucencyEnabled: true, fadeByDistance: true, showVectorData: true, alpha: 0.5,
        };
        Cesium.knockout.track(viewModel);
        const toolbarElement = document.getElementById("toolbar");
        Cesium.knockout.applyBindings(viewModel, toolbarElement);

        function updateTranslucencyAndVectorData() {
            globe.translucency.enabled = viewModel.translucencyEnabled;
            let currentAlpha = Number(viewModel.alpha);
            currentAlpha = !isNaN(currentAlpha) ? currentAlpha : 1.0;
            currentAlpha = Cesium.Math.clamp(currentAlpha, 0.0, 1.0);
            const nearDistance = 400.0; const farDistance = 800.0;
            if (globe.translucency.frontFaceAlphaByDistance) {
                 globe.translucency.frontFaceAlphaByDistance.nearValue = currentAlpha;
                 globe.translucency.frontFaceAlphaByDistance.nearDistance = nearDistance;
                 globe.translucency.frontFaceAlphaByDistance.farValue = viewModel.fadeByDistance ? 1.0 : currentAlpha;
                 globe.translucency.frontFaceAlphaByDistance.farDistance = farDistance;
            } else {
                 globe.translucency.frontFaceAlphaByDistance = new Cesium.NearFarScalar(
                    nearDistance, currentAlpha, farDistance, viewModel.fadeByDistance ? 1.0 : currentAlpha);
            }
            pipelineEntities.forEach(entity => { entity.show = viewModel.showVectorData; });
            viewer.scene.requestRender();
        }
        // Knockout subscription for toolbar checkbox
        for (const name in viewModel) {
            if (viewModel.hasOwnProperty(name)) {
                if (name === 'showVectorData') {
                    Cesium.knockout.getObservable(viewModel, name).subscribe(updatePipelineVisibilityBasedOnZoom);
                } else {
                    Cesium.knockout.getObservable(viewModel, name).subscribe(updateTranslucencyAndVectorData);
                }
            }
        }
        updateTranslucencyAndVectorData(); // Initial call

        viewer.camera.flyTo({
            destination: new Cesium.Cartesian3(3827270.552916987, -255123.18143177085, 5079147.091351856),
            orientation: new Cesium.HeadingPitchRoll(3.2624281242239963, -0.22213535190506972, 6.282786783842843),
            duration: 0.0,
            complete: () => { updateStatus("Ready. Use toolbar for translucency. Enable GPS/AR."); viewer.scene.requestRender(); }
        });

        function checkInitialFeatures() {
            if (!("geolocation" in navigator)) { gpsBtn.disabled = true; gpsBtn.textContent = "GPS Not Supported"; }
            if (typeof DeviceOrientationEvent === "undefined") {
                orientationBtn.disabled = true; orientationBtn.textContent = "AR Not Supported";
                calibrateBtn.disabled = true;
            }
            updateButtonsState();
        }

        window.addEventListener('load', function() {
            checkInitialFeatures();
            if (navigator.permissions) {
                navigator.permissions.query({name:'geolocation'}).then(p => {
                    if (p.state === 'granted') updateStatus("GPS permission previously granted.", false);
                    else if (p.state === 'prompt') updateStatus("GPS permission will be prompted.", false);
                    else updateStatus("GPS permission denied. Check browser/OS settings.", true);
                }).catch(e => console.warn("Permissions API for geolocation not fully supported or error:", e));
                if (isIOS && typeof DeviceOrientationEvent.requestPermission === "function") {
                     navigator.permissions.query({name:'gyroscope'})
                        .then(p => {})
                        .catch(e => console.warn("Permissions API for motion sensors not fully supported or error:", e));
                }
            }
            updatePipelineVisibilityBasedOnZoom(); // Initial check on load
            viewer.scene.requestRender();
        });
    </script>
</body>
</html>
